name: CI
# Full WinterCMS installation via acorn-setup-new-winter, Apache + PHP-FPM, then curl smoke tests.
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:

  # ── Quick syntax check (no WinterCMS needed) ─────────────────────────────────

  lint:
    name: PHP Syntax
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  # ── Functional tests: Apache + PHP-FPM, session-based curl checks ────────────

  functional:
    name: Functional (WinterCMS ${{ matrix.wintercms }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - wintercms: "1.2.0"
            php: "8.1"
          - wintercms: "dev-develop"
            php: "8.2"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wintercms
          POSTGRES_USER: createsystem
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          path: calendar-src

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql, mbstring, xml, gd, curl, zip
          coverage: none

      - name: Check out setup scripts
        uses: actions/checkout@v4
        with:
          repository: anewholm/scripts
          path: scripts-repo

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-wintercms-${{ matrix.wintercms }}
          restore-keys: composer-wintercms-

      - name: Install WinterCMS + Acorn + Calendar
        run: |
          bash scripts-repo/acorn-setup-new-winter \
            --winter-version=${{ matrix.wintercms }} \
            --admin-password=testpassword123 \
            --db-username=createsystem \
            --db-password=testpassword \
            --db-host=127.0.0.1 \
            --acorn-github=anewholm/acorn \
            --calendar-src=${{ github.workspace }}/calendar-src \
            --no-interactive \
            --no-dbauth \
            --apply-l10-fix \
            --no-apache \
            --ci \
            --no-start-server \
            --install-dir=${{ github.workspace }} \
            wintercms

      - name: Configure Apache + PHP-FPM
        run: |
          PHP_VER="${{ matrix.php }}"
          DOCROOT="${{ github.workspace }}/wintercms/public"

          # Security: Avoid 403s, these are functional checks, not security
          # Really, we want to add runner to www-data, but we would need to start a new shell for the changes to take effect
          sudo chown -R runner:runner ${{ github.workspace }}/wintercms
          sudo chmod -R go+rX ${{ github.workspace }}/wintercms
          sudo chmod -R go+rw ${{ github.workspace }}/wintercms/storage

          # Apache2 potentially already installed
          # but as it is a dependency, we include it anyway
          sudo apt-get update -q
          sudo apt-get install -y apache2 php${PHP_VER}-fpm
          sudo a2enmod proxy proxy_fcgi setenvif rewrite

          # FPM pool: run as the runner user, recycle workers every 20 requests
          POOL=/etc/php/${PHP_VER}/fpm/pool.d/www.conf
          sudo sed -i "s/^user = .*/user = runner/" $POOL
          sudo sed -i "s/^group = .*/group = runner/" $POOL
          printf '\npm.max_requests = 20\nphp_admin_value[error_log] = /tmp/php-errors.log\nphp_admin_flag[log_errors] = on\nphp_admin_flag[display_errors] = off\n' | sudo tee -a $POOL

          sudo tee /etc/apache2/sites-available/wintercms.conf << APACHEEOF
          <VirtualHost *:80>
              DocumentRoot ${DOCROOT}
              <Directory ${DOCROOT}>
                  AllowOverride All
                  Require all granted
                  Options -Indexes +FollowSymLinks
              </Directory>
              <FilesMatch "\.php$">
                  SetHandler "proxy:unix:/run/php/php${PHP_VER}-fpm.sock|fcgi://localhost"
              </FilesMatch>
              ErrorLog  /tmp/apache-error.log
              CustomLog /tmp/apache-access.log combined
          </VirtualHost>
          APACHEEOF

          sudo a2dissite 000-default.conf
          sudo a2ensite wintercms.conf

          # Setup script writes APP_URL=http://localhost:8000 in --ci mode; fix for Apache on port 80
          sed -i 's|APP_URL=http://localhost:8000|APP_URL=http://localhost|' \
            ${{ github.workspace }}/wintercms/.env

          sudo service php${PHP_VER}-fpm restart
          sudo apache2ctl configtest
          sudo service apache2 restart

      - name: Login and save session cookie
        run: |
          for i in $(seq 1 20); do
            if curl -sfL http://localhost/backend/backend/auth/signin -o /dev/null 2>/dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 2
          done

          BODY=$(curl -s -L -c /tmp/cookies.txt http://localhost/backend/backend/auth/signin)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          if [ -z "$TOKEN" ]; then
            echo "ERROR: no CSRF token — Apache or PHP-FPM may not be ready"
            echo $BODY
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -c /tmp/cookies.txt -b /tmp/cookies.txt \
            --data-urlencode "_token=$TOKEN" \
            -d "postback=1&login=admin&password=testpassword123" \
            http://localhost/backend/backend/auth/signin)
          echo "Login status: $STATUS"
          test "$STATUS" = "302"

      # ── Backend calendar page tests ─────────────────────────────────────────────

      - name: Calendar months view loads (not 500)
        run: |
          RESPONSE=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost/backend/acorn/calendar/months)
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Calendar months status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response (first 40 lines) ==="
            echo "$RESPONSE" | grep -v "HTTP_STATUS:" | head -40
          fi
          test "$STATUS" = "200"

      - name: Calendar list (Calendars controller) loads
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost/backend/acorn/calendar/calendars)
          echo "Calendars list status: $STATUS"
          test "$STATUS" = "200"

      - name: Event statuses list loads
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost/backend/acorn/calendar/eventstatuses)
          echo "Event statuses status: $STATUS"
          test "$STATUS" = "200"

      - name: Event types list loads
        run: |
          STATUS=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost/backend/acorn/calendar/eventtypes)
          echo "Event types status: $STATUS"
          test "$STATUS" = "200"

      - name: Calendar create form loads
        run: |
          RESPONSE=$(curl -s -L -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            http://localhost/backend/acorn/calendar/calendars/create)
          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          echo "Calendar create form status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response body (first 60 lines) ==="
            echo "$RESPONSE" | grep -v "HTTP_STATUS:" | head -60
          fi
          test "$STATUS" = "200"

      # ── Calendar CRUD via WinterCMS backend AJAX ────────────────────────────────

      - name: Create a calendar via AJAX
        run: |
          BODY=$(curl -s -b /tmp/cookies.txt http://localhost/backend/acorn/calendar/calendars/create)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            -H "X-WINTER-REQUEST-HANDLER: onSave" \
            -H "X-WINTER-REQUEST-PARTIALS: " \
            -H "X-Requested-With: XMLHttpRequest" \
            -F "_token=$TOKEN" \
            -F "Calendar[name]=CI Test Calendar" \
            -F "Calendar[description]=Created by CI" \
            http://localhost/backend/acorn/calendar/calendars/create)

          STATUS=$(echo "$RESPONSE" | tail -1)
          echo "Create calendar status: $STATUS"
          test "$STATUS" = "200" -o "$STATUS" = "302"

      - name: Verify calendar appears in database
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_calendar_calendars WHERE name='CI Test Calendar';" | tr -d ' ')
          echo "Calendar records in DB: $COUNT"
          test "$COUNT" -ge "1"

      # ── Repeating event test ────────────────────────────────────────────────────

      - name: Create a repeating event via psql (bypasses UI, tests model/DB directly)
        run: |
          PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE
            v_calendar_id uuid;
            v_event_id    uuid;
            v_status_id   uuid;
            v_type_id     uuid;
          BEGIN
            SELECT id INTO v_calendar_id FROM acorn_calendar_calendars LIMIT 1;
            SELECT id INTO v_status_id   FROM acorn_calendar_event_statuses LIMIT 1;
            SELECT id INTO v_type_id     FROM acorn_calendar_event_types LIMIT 1;

            INSERT INTO acorn_calendar_events (calendar_id, created_at, updated_at)
            VALUES (v_calendar_id, NOW(), NOW())
            RETURNING id INTO v_event_id;

            INSERT INTO acorn_calendar_event_parts
              (event_id, name, status_id, type_id,
               start, "end", repeat, repeat_frequency, created_at, updated_at)
            VALUES
              (v_event_id, 'Weekly CI Test', v_status_id, v_type_id,
               NOW(), NOW() + INTERVAL '1 hour', '1 week', 1, NOW(), NOW());
          END $$;
          SQLEOF

      - name: Verify repeating event stored correctly
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_calendar_event_parts WHERE repeat IS NOT NULL;" | tr -d ' ')
          echo "Repeating events in DB: $COUNT"
          test "$COUNT" -ge "1"

      - name: Calendar months view loads with events present
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -b /tmp/cookies.txt \
            http://localhost/backend/acorn/calendar/months)
          echo "Calendar with events status: $STATUS"
          test "$STATUS" = "200"

      - name: Create event via popup AJAX (onCreateEvent)
        run: |
          BODY=$(curl -s -b /tmp/cookies.txt http://localhost/backend/acorn/calendar/months)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"

          STATUS_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM acorn_calendar_event_statuses LIMIT 1;" | tr -d ' \n')
          TYPE_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM acorn_calendar_event_types LIMIT 1;" | tr -d ' \n')
          CALENDAR_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM acorn_calendar_calendars LIMIT 1;" | tr -d ' \n')
          echo "status=$STATUS_ID type=$TYPE_ID calendar=$CALENDAR_ID"
          test -n "$STATUS_ID"
          test -n "$TYPE_ID"
          test -n "$CALENDAR_ID"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            -H "X-WINTER-REQUEST-HANDLER: onCreateEvent" \
            -H "X-WINTER-REQUEST-PARTIALS: " \
            -H "X-Requested-With: XMLHttpRequest" \
            -F "_token=$TOKEN" \
            -F "EventPart[name]=CI Test Event" \
            -F "EventPart[start]=2026-01-15 10:00:00" \
            -F "EventPart[end]=2026-01-15 11:00:00" \
            -F "EventPart[status]=$STATUS_ID" \
            -F "EventPart[type]=$TYPE_ID" \
            -F "EventPart[event][calendar]=$CALENDAR_ID" \
            http://localhost/backend/acorn/calendar/months)

          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Create event status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response body (first 40 lines) ==="
            echo "$BODY" | head -40
            exit 1
          fi
          if echo "$BODY" | grep -qi '"error":\|Class.*not found\|"exception":"'; then
            echo "=== Error content found in 200 response ==="
            echo "$BODY" | head -40
            exit 1
          fi
          echo "Create event: OK"

      - name: +event popup AJAX (onOpenDay) loads without error
        run: |
          BODY=$(curl -s -b /tmp/cookies.txt http://localhost/backend/acorn/calendar/months)
          TOKEN=$(echo "$BODY" | grep -o 'name="csrf-token" content="[^"]*"' | sed 's/.*content="\([^"]*\)"/\1/' | head -1)
          test -n "$TOKEN"

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -b /tmp/cookies.txt -c /tmp/cookies.txt \
            -H "X-WINTER-REQUEST-HANDLER: onOpenDay" \
            -H "X-WINTER-REQUEST-PARTIALS: " \
            -H "X-Requested-With: XMLHttpRequest" \
            -F "_token=$TOKEN" \
            -F "path=2026-01-15" \
            http://localhost/backend/acorn/calendar/months)

          STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | sed 's/.*HTTP_STATUS://')
          POPUP_BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "+event popup status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "=== Response body (first 40 lines) ==="
            echo "$POPUP_BODY" | head -40
            exit 1
          fi
          if echo "$POPUP_BODY" | grep -qi '"error":\|dropdownOptions\|class_exists\|LARAVEL_START'; then
            echo "=== Error content found in 200 response ==="
            echo "$POPUP_BODY" | head -40
            exit 1
          fi
          echo "+event popup: OK"

      - name: Dump Apache error log on failure
        if: failure()
        run: cat /tmp/apache-error.log || echo "(no Apache error log)"

      - name: Dump PHP error log on failure
        if: failure()
        run: cat /tmp/php-errors.log || echo "(no PHP error log)"

      - name: Dump WinterCMS log on failure
        if: failure()
        working-directory: ${{ github.workspace }}/wintercms
        run: find storage/logs -name "*.log" -exec cat {} \;
