name: CI
# Full WinterCMS installation via acorn-setup-new-winter, Apache + PHP-FPM, then curl smoke tests.
permissions:
  contents: read
  pull-requests: write
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ‚îÄ‚îÄ Quick syntax check (no WinterCMS needed) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

  lint:
    name: PHP Syntax
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" -exec php -l {} \;

  # ‚îÄ‚îÄ Functional tests: Apache + PHP-FPM, session-based curl checks ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

  functional:
    name: Functional (${{ matrix.label }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: "WinterCMS 1.2.0"
            wintercms: "1.2.0"
            php: "8.1"
            with_user: false
          - label: "WinterCMS 1.2.0 + User"
            wintercms: "1.2.0"
            php: "8.1"
            with_user: true
          #- label: "WinterCMS dev-develop"
          #  wintercms: "dev-develop"
          #  php: "8.2"
          #  with_user: false

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: wintercms
          POSTGRES_USER: createsystem
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          path: calendar-src

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo_pgsql, mbstring, xml, gd, curl, zip
          coverage: none

      - name: Check out setup scripts
        uses: actions/checkout@v4
        with:
          repository: anewholm/scripts
          path: scripts-repo

      - name: Check out User plugin (public once User repo is public)
        if: ${{ matrix.with_user }}
        uses: actions/checkout@v4
        with:
          repository: anewholm/user
          path: user-src

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-wintercms-${{ matrix.wintercms }}
          restore-keys: composer-wintercms-

      - name: Install WinterCMS + Acorn + Calendar
        run: |
          bash scripts-repo/acorn-setup-new-winter \
            --winter-version=${{ matrix.wintercms }} \
            --admin-password=testpassword123 \
            --db-username=createsystem \
            --db-password=testpassword \
            --db-host=127.0.0.1 \
            --acorn-github=anewholm/acorn \
            --calendar-src=${{ github.workspace }}/calendar-src \
            ${{ matrix.with_user && format('--user-src={0}/user-src', github.workspace) || '' }} \
            --no-interactive \
            --no-dbauth \
            --apply-l10-fix \
            --no-apache \
            --ci \
            --no-start-server \
            --install-dir=${{ github.workspace }} \
            wintercms

      - name: Configure Apache + PHP-FPM
        run: |
          PHP_VER="${{ matrix.php }}"
          DOCROOT="${{ github.workspace }}/wintercms"

          # Allow www-data (Apache) to traverse from /home/runner down to the docroot.
          # go+rX on wintercms/ is not enough ‚Äî every ancestor directory needs o+x too.
          sudo chmod o+x /home/runner
          sudo chmod -R o+X /home/runner/work
          sudo chmod -R go+rX ${{ github.workspace }}/wintercms
          sudo chmod -R go+rw ${{ github.workspace }}/wintercms/storage

          # Apache2 potentially already installed
          # but as it is a dependency, we include it anyway
          sudo apt-get update -q
          sudo apt-get install -y apache2 php${PHP_VER}-fpm
          sudo a2enmod proxy proxy_fcgi setenvif rewrite

          # FPM pool: run as the runner user, recycle workers every 20 requests
          POOL=/etc/php/${PHP_VER}/fpm/pool.d/www.conf
          sudo sed -i "s/^user = .*/user = runner/" $POOL
          sudo sed -i "s/^group = .*/group = runner/" $POOL
          printf '\npm.max_requests = 20\nchdir = %s/wintercms\nphp_admin_value[error_log] = /tmp/php-errors.log\nphp_admin_flag[log_errors] = on\nphp_admin_flag[display_errors] = off\n' \
            "${{ github.workspace }}" | sudo tee -a $POOL

          sudo tee /etc/apache2/sites-available/wintercms.conf << APACHEEOF
          <VirtualHost *:80>
              DocumentRoot ${DOCROOT}
              <Directory ${DOCROOT}>
                  AllowOverride All
                  Require all granted
                  Options -Indexes +FollowSymLinks
              </Directory>
              <FilesMatch "\.php$">
                  SetHandler "proxy:unix:/run/php/php${PHP_VER}-fpm.sock|fcgi://localhost"
              </FilesMatch>
              ErrorLog  /tmp/apache-error.log
              CustomLog /tmp/apache-access.log combined
          </VirtualHost>
          APACHEEOF

          sudo a2dissite 000-default.conf
          sudo a2ensite wintercms.conf

          # Setup script writes APP_URL=http://localhost:8000 in --ci mode; fix for Apache on port 80
          sed -i 's|APP_URL=http://localhost:8000|APP_URL=http://localhost|' \
            ${{ github.workspace }}/wintercms/.env

          sudo service php${PHP_VER}-fpm restart
          sudo apache2ctl configtest
          sudo service apache2 restart

      - name: Login and save session cookie
        run: scripts-repo/acorn-cli-wintercms-login --password=testpassword123

      # ‚îÄ‚îÄ Backend calendar page tests ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: Calendar months view loads (not 500)
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/calendar/months

      - name: Calendar list (Calendars controller) loads
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/calendar/calendars

      - name: Event statuses list loads
        run: scripts-repo/acorn-cli-wintercms-request http://localhost/backend/acorn/calendar/eventstatuses

      - name: Event types list loads
        run: scripts-repo/acorn-cli-wintercms-request http://localhost/backend/acorn/calendar/eventtypes

      - name: Calendar create form loads
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/calendar/calendars/create

      # ‚îÄ‚îÄ Calendar CRUD via WinterCMS backend AJAX ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: Create a calendar via AJAX
        run: |
          scripts-repo/acorn-cli-wintercms-request \
            --handler=onSave \
            --check-errors \
            --expected=200,302 \
            http://localhost/backend/acorn/calendar/calendars/create \
            "Calendar[name]=CI Test Calendar" \
            "Calendar[description]=Created by CI"

      - name: Verify calendar appears in database
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_calendar_calendars WHERE name='CI Test Calendar';" | tr -d ' ')
          echo "Calendar records in DB: $COUNT"
          test "$COUNT" -ge "1"

      # ‚îÄ‚îÄ Repeating event test ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: Create a repeating event via psql (bypasses UI, tests model/DB directly)
        run: |
          PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE
            v_calendar_id uuid;
            v_event_id    uuid;
            v_status_id   uuid;
            v_type_id     uuid;
          BEGIN
            SELECT id INTO v_calendar_id FROM acorn_calendar_calendars LIMIT 1;
            SELECT id INTO v_status_id   FROM acorn_calendar_event_statuses LIMIT 1;
            SELECT id INTO v_type_id     FROM acorn_calendar_event_types LIMIT 1;

            INSERT INTO acorn_calendar_events (calendar_id, created_at, updated_at)
            VALUES (v_calendar_id, NOW(), NOW())
            RETURNING id INTO v_event_id;

            INSERT INTO acorn_calendar_event_parts
              (event_id, name, status_id, type_id,
               start, "end", repeat, repeat_frequency, created_at, updated_at)
            VALUES
              (v_event_id, 'Weekly CI Test', v_status_id, v_type_id,
               NOW(), NOW() + INTERVAL '1 hour', '1 week', 1, NOW(), NOW());
          END $$;
          SQLEOF

      - name: Verify repeating event stored correctly
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_calendar_event_parts WHERE repeat IS NOT NULL;" | tr -d ' ')
          echo "Repeating events in DB: $COUNT"
          test "$COUNT" -ge "1"

      - name: Calendar months view loads with events present
        run: scripts-repo/acorn-cli-wintercms-request http://localhost/backend/acorn/calendar/months

      - name: Create event via popup AJAX (onCreateEvent)
        run: |
          STATUS_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM acorn_calendar_event_statuses LIMIT 1;" | tr -d ' \n')
          TYPE_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM acorn_calendar_event_types LIMIT 1;" | tr -d ' \n')
          CALENDAR_ID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT id FROM acorn_calendar_calendars LIMIT 1;" | tr -d ' \n')
          echo "status=$STATUS_ID type=$TYPE_ID calendar=$CALENDAR_ID"
          test -n "$STATUS_ID"
          test -n "$TYPE_ID"
          test -n "$CALENDAR_ID"

          scripts-repo/acorn-cli-wintercms-request \
            --handler=onCreateEvent \
            --check-errors \
            http://localhost/backend/acorn/calendar/months \
            "EventPart[name]=CI Test Event" \
            "EventPart[start]=2026-01-15 10:00:00" \
            "EventPart[end]=2026-01-15 11:00:00" \
            "EventPart[status]=$STATUS_ID" \
            "EventPart[type]=$TYPE_ID" \
            "EventPart[event][calendar]=$CALENDAR_ID"

      - name: +event popup AJAX (onOpenDay) loads without error
        run: |
          scripts-repo/acorn-cli-wintercms-request \
            --handler=onOpenDay \
            --check-errors \
            --retry=3 \
            --retry-sleep=10 \
            http://localhost/backend/acorn/calendar/months \
            "path=2026-01-15"

      # ‚îÄ‚îÄ User plugin integration tests (only when with_user: true) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: User plugin tables exist
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM information_schema.tables WHERE table_name LIKE 'acorn_user_%';" | tr -d ' ')
          echo "User plugin tables: $COUNT"
          test "$COUNT" -ge "10"

      - name: Calendar extra columns added to acorn_user_users (acorn.user.tables.ready)
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM information_schema.columns WHERE table_name='acorn_user_users' AND column_name IN ('acorn_default_calendar','acorn_start_of_week');" | tr -d ' ')
          echo "Calendar columns on acorn_user_users: $COUNT"
          test "$COUNT" -eq "2"

      - name: Create a user group and assign it as calendar owner
        if: ${{ matrix.with_user }}
        run: |
          PGPASSWORD=testpassword psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE
            v_group_id    uuid;
            v_calendar_id uuid;
          BEGIN
            INSERT INTO acorn_user_user_groups(name, code)
            VALUES ('CI Physics Group', 'CI-PHY')
            RETURNING id INTO v_group_id;

            SELECT id INTO v_calendar_id FROM acorn_calendar_calendars LIMIT 1;

            UPDATE acorn_calendar_calendars
               SET owner_user_group_id = v_group_id
             WHERE id = v_calendar_id;
          END $$;
          SQLEOF

      - name: Months view still loads with owner_user_group set
        if: ${{ matrix.with_user }}
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/calendar/months

      - name: User list loads (User backend registered)
        if: ${{ matrix.with_user }}
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/user/users

      - name: User groups list loads
        if: ${{ matrix.with_user }}
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/user/usergroups

      # ‚îÄ‚îÄ Attendee pivot table tests ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: Attendee pivot tables exist
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'
                   AND table_name IN ('acorn_calendar_event_part_user','acorn_calendar_event_part_user_group');" | tr -d ' ')
          echo "Attendee pivot tables: $COUNT"
          test "$COUNT" = "2"

      - name: Assign user attendee to event part
        if: ${{ matrix.with_user }}
        run: |
          PGPASSWORD=testpassword psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE
            v_event_part_id uuid;
            v_user_id       uuid;
          BEGIN
            SELECT id INTO v_event_part_id FROM acorn_calendar_event_parts LIMIT 1;
            v_user_id := fn_acorn_user_get_seed_user();
            INSERT INTO acorn_calendar_event_part_user (event_part_id, user_id)
            VALUES (v_event_part_id, v_user_id)
            ON CONFLICT DO NOTHING;
          END $$;
          SQLEOF

      - name: Verify user attendee in pivot table
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_calendar_event_part_user;" | tr -d ' ')
          echo "User attendee rows: $COUNT"
          test "$COUNT" -ge "1"

      - name: Assign group attendee to event part
        if: ${{ matrix.with_user }}
        run: |
          PGPASSWORD=testpassword psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE
            v_event_part_id uuid;
            v_group_id      uuid;
          BEGIN
            SELECT id INTO v_event_part_id FROM acorn_calendar_event_parts LIMIT 1;
            SELECT id INTO v_group_id FROM acorn_user_user_groups WHERE name = 'CI Physics Group';
            INSERT INTO acorn_calendar_event_part_user_group (event_part_id, user_group_id)
            VALUES (v_event_part_id, v_group_id)
            ON CONFLICT DO NOTHING;
          END $$;
          SQLEOF

      - name: Verify group attendee in pivot table
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_calendar_event_part_user_group;" | tr -d ' ')
          echo "Group attendee rows: $COUNT"
          test "$COUNT" -ge "1"

      - name: Months view renders with user and group attendees (not 500)
        if: ${{ matrix.with_user }}
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/calendar/months

      - name: Event popup renders with attendees present
        if: ${{ matrix.with_user }}
        run: |
          scripts-repo/acorn-cli-wintercms-request \
            --handler=onOpenDay \
            --check-errors \
            --retry=3 \
            --retry-sleep=5 \
            http://localhost/backend/acorn/calendar/months \
            "path=2026-01-15"

      - name: Event create form includes owner_user and owner_user_group fields
        if: ${{ matrix.with_user }}
        run: |
          BODY=$(curl -s -L -b /tmp/cookies.txt http://localhost/backend/acorn/calendar/calendars/create)
          STATUS=$(curl -s -L -b /tmp/cookies.txt -o /dev/null -w "%{http_code}" \
            http://localhost/backend/acorn/calendar/calendars/create)
          echo "Create form status: $STATUS"
          test "$STATUS" = "200"
          echo "$BODY" | grep -qi "owner" && echo "owner field found: OK" || echo "owner field not visible (permission gate)"

      - name: User edit form loads with calendar extension (default calendar field)
        if: ${{ matrix.with_user }}
        run: |
          SEED_UUID=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT fn_acorn_user_get_seed_user();" | tr -d ' ')
          echo "Seed user UUID: $SEED_UUID"
          test -n "$SEED_UUID"
          scripts-repo/acorn-cli-wintercms-request \
            --check-errors \
            http://localhost/backend/acorn/user/users/update/${SEED_UUID}

      # ‚îÄ‚îÄ Temporal membership (membersOn / currentMembers / EXCLUDE) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

      - name: Insert temporal membership for CI Physics Group
        if: ${{ matrix.with_user }}
        run: |
          PGPASSWORD=testpassword psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE
            v_user_id  uuid;
            v_group_id uuid;
          BEGIN
            v_user_id  := fn_acorn_user_get_seed_user();
            SELECT id INTO v_group_id FROM acorn_user_user_groups WHERE name = 'CI Physics Group';
            INSERT INTO acorn_user_user_group_users (user_id, user_group_id, period)
            VALUES (v_user_id, v_group_id, daterange('2025-01-01', NULL))
            ON CONFLICT DO NOTHING;
          END $$;
          SQLEOF

      - name: membersOn ‚Äî query within period returns the member
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_user_user_group_users ug
                   JOIN acorn_user_user_groups g ON g.id = ug.user_group_id
                   WHERE g.name = 'CI Physics Group'
                   AND ug.period @> '2026-01-15'::date;" | tr -d ' ')
          echo "Members on 2026-01-15: $COUNT"
          test "$COUNT" -ge "1"

      - name: membersOn ‚Äî query before join date returns no rows
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_user_user_group_users ug
                   JOIN acorn_user_user_groups g ON g.id = ug.user_group_id
                   WHERE g.name = 'CI Physics Group'
                   AND ug.period @> '2024-12-31'::date;" | tr -d ' ')
          echo "Members before join date (expect 0): $COUNT"
          test "$COUNT" = "0"

      - name: currentMembers ‚Äî upper_inf selects only open-ended rows
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_user_user_group_users ug
                   JOIN acorn_user_user_groups g ON g.id = ug.user_group_id
                   WHERE g.name = 'CI Physics Group'
                   AND upper_inf(ug.period);" | tr -d ' ')
          echo "Current members (upper_inf): $COUNT"
          test "$COUNT" -ge "1"

      - name: EXCLUDE constraint exists on temporal membership table
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM pg_constraint
                   WHERE conrelid = 'acorn_user_user_group_users'::regclass
                   AND contype = 'x';" | tr -d ' ')
          echo "EXCLUDE constraints on temporal membership table: $COUNT"
          test "$COUNT" -ge "1"

      - name: EXCLUDE blocks overlapping membership insert
        if: ${{ matrix.with_user }}
        run: |
          RESULT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms 2>&1 << 'SQLEOF' || true
          DO $$
          DECLARE v_user_id uuid; v_group_id uuid;
          BEGIN
            v_user_id  := fn_acorn_user_get_seed_user();
            SELECT id INTO v_group_id FROM acorn_user_user_groups WHERE name = 'CI Physics Group';
            -- Overlaps with existing [2025-01-01, inf) period ‚Äî must be rejected
            INSERT INTO acorn_user_user_group_users (user_id, user_group_id, period)
            VALUES (v_user_id, v_group_id, daterange('2026-01-01', NULL));
          END $$;
          SQLEOF
          )
          echo "Overlap result: $RESULT"
          echo "$RESULT" | grep -qiE "exclusion constraint|violates exclusion|ERROR"
          echo "EXCLUDE constraint blocked overlapping insert: OK"

      - name: Close membership period (member leaves group)
        if: ${{ matrix.with_user }}
        run: |
          PGPASSWORD=testpassword psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U createsystem -d wintercms \
            -c "UPDATE acorn_user_user_group_users
                SET period = daterange(lower(period), '2026-06-01')
                WHERE user_group_id = (SELECT id FROM acorn_user_user_groups WHERE name = 'CI Physics Group')
                AND upper_inf(period);"

      - name: Re-join after leave ‚Äî non-overlapping row permitted by EXCLUDE
        if: ${{ matrix.with_user }}
        run: |
          PGPASSWORD=testpassword psql -v ON_ERROR_STOP=1 -h 127.0.0.1 -U createsystem -d wintercms << 'SQLEOF'
          DO $$
          DECLARE v_user_id uuid; v_group_id uuid;
          BEGIN
            v_user_id  := fn_acorn_user_get_seed_user();
            SELECT id INTO v_group_id FROM acorn_user_user_groups WHERE name = 'CI Physics Group';
            INSERT INTO acorn_user_user_group_users (user_id, user_group_id, period)
            VALUES (v_user_id, v_group_id, daterange('2026-09-01', NULL));
          END $$;
          SQLEOF

      - name: Two membership rows exist after leave-and-rejoin
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_user_user_group_users ug
                   JOIN acorn_user_user_groups g ON g.id = ug.user_group_id
                   WHERE g.name = 'CI Physics Group';" | tr -d ' ')
          echo "Total membership rows after rejoin: $COUNT"
          test "$COUNT" = "2"

      - name: membersOn ‚Äî gap between memberships returns no rows
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_user_user_group_users ug
                   JOIN acorn_user_user_groups g ON g.id = ug.user_group_id
                   WHERE g.name = 'CI Physics Group'
                   AND ug.period @> '2026-07-15'::date;" | tr -d ' ')
          echo "Members during gap [2026-06-01, 2026-09-01) (expect 0): $COUNT"
          test "$COUNT" = "0"

      - name: membersOn ‚Äî second membership period is active
        if: ${{ matrix.with_user }}
        run: |
          COUNT=$(PGPASSWORD=testpassword psql -h 127.0.0.1 -U createsystem -d wintercms \
            -t -c "SELECT count(*) FROM acorn_user_user_group_users ug
                   JOIN acorn_user_user_groups g ON g.id = ug.user_group_id
                   WHERE g.name = 'CI Physics Group'
                   AND ug.period @> '2026-10-01'::date;" | tr -d ' ')
          echo "Members after rejoin date: $COUNT"
          test "$COUNT" = "1"

      - name: Calendar months view still loads cleanly after all membership changes
        if: ${{ matrix.with_user }}
        run: scripts-repo/acorn-cli-wintercms-request --check-errors http://localhost/backend/acorn/calendar/months

      - name: Dump Apache error log on failure
        if: failure()
        run: cat /tmp/apache-error.log || echo "(no Apache error log)"

      - name: Dump PHP-FPM system log on failure
        if: failure()
        run: sudo cat /var/log/php${{ matrix.php }}-fpm.log || echo "(no FPM log)"

      - name: Dump PHP error log on failure
        if: failure()
        run: cat /tmp/php-errors.log || echo "(no PHP error log)"

      - name: Dump WinterCMS log on failure
        if: failure()
        working-directory: ${{ github.workspace }}/wintercms
        run: find storage/logs -name "*.log" -exec cat {} \;
